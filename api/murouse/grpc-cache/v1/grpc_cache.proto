syntax = "proto3";

package murouse.grpc_cache.v1;

option go_package = "github.com/murouse/grpc-cache/pkg/api/murouse/grpc_cache/v1;grpccachev1";

import "google/protobuf/descriptor.proto";
import "google/protobuf/duration.proto";

message Policy {
  google.protobuf.Duration ttl = 1; // Cache entry lifetime. ttl == 0 -> don't expired
  bool actor_scoped = 2;            // Whether the cache key should include the request actor
}

extend google.protobuf.MethodOptions {
  Policy policy = 51236;
}

